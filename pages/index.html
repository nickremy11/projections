<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Projections — FF Historian</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Playfair+Display:ital,wght@0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<style>
:root {
  --cream:       #f5ead6;
  --parchment:   #e8d5b0;
  --brown-dark:  #2a1a0e;
  --brown-mid:   #5c3d1e;
  --brown-light: #8b5e2e;
  --green:       #2d4a1e;
  --green-light: #4a7a2f;
  --red:         #8b1a1a;
  --gold:        #c9962a;
  --gold-light:  #e8b84b;
  --ink:         #1a1008;
  --pos-qb:      #7a1a1a;
  --pos-rb:      #1a4a1a;
  --pos-wr:      #1a2a6a;
  --pos-te:      #5a1a7a;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Crimson Text', Georgia, serif;
  min-height: 100vh;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9962a' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.page-wrap { position: relative; z-index: 1; }

/* ── Banner ── */
.banner { background: var(--green); border-bottom: 6px double var(--gold); position: relative; overflow: hidden; }
.banner::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(0,0,0,0.06) 10px, rgba(0,0,0,0.06) 11px);
}
.banner-inner {
  position: relative; z-index: 1;
  max-width: 1600px; margin: 0 auto; padding: 18px 24px 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.banner-left { flex: 1; }
.banner-back {
  font-family: 'Rye', serif; font-size: 0.52rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--gold-light); text-decoration: none;
  opacity: 0.7; display: inline-block; margin-bottom: 6px;
}
.banner-back:hover { opacity: 1; }
.banner h1 { font-family: 'Rye', serif; font-size: clamp(1rem, 2.5vw, 1.6rem); color: var(--cream); text-shadow: 2px 2px 0 rgba(0,0,0,0.4); line-height: 1.1; }
.banner h1 span { color: var(--gold-light); }
.banner-sub { margin-top: 4px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.8rem; color: var(--parchment); opacity: 0.75; }
#auth-chip { display: flex; align-items: center; }

.content { max-width: 1600px; margin: 0 auto; padding: 20px 16px 60px; }
.hidden { display: none !important; }

/* ── Auth gate ── */
.auth-gate {
  margin: 80px auto; max-width: 480px;
  background: var(--brown-dark); border: 2px solid var(--gold); border-radius: 2px;
  padding: 40px 36px; text-align: center;
}
.auth-gate h2 { font-family: 'Rye', serif; font-size: 1.1rem; color: var(--gold-light); margin-bottom: 12px; }
.auth-gate p { color: var(--parchment); font-size: 1rem; margin-bottom: 20px; }

/* ── Buttons ── */
.btn {
  font-family: 'Rye', serif; font-size: 0.52rem; letter-spacing: 0.16em; text-transform: uppercase;
  border: 2px solid var(--gold); background: var(--green); color: var(--gold-light);
  padding: 8px 16px; cursor: pointer; border-radius: 2px; transition: background 0.15s, color 0.15s;
  text-decoration: none; white-space: nowrap; display: inline-block;
}
.btn:hover { background: var(--gold); color: var(--brown-dark); }
.btn-sm { font-size: 0.46rem; padding: 5px 10px; }
.btn-danger { border-color: var(--red); background: transparent; color: var(--red); }
.btn-danger:hover { background: var(--red); color: var(--cream); }
.btn-ghost { background: transparent; color: var(--brown-light); border-color: var(--brown-mid); }
.btn-ghost:hover { background: var(--brown-mid); color: var(--cream); }

/* ── Tabs nav ── */
.tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--brown-mid); margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn {
  font-family: 'Rye', serif; font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase;
  background: transparent; border: none; border-bottom: 3px solid transparent; margin-bottom: -2px;
  color: var(--brown-light); padding: 12px 20px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
}
.tab-btn:hover { color: var(--brown-dark); }
.tab-btn.active { color: var(--brown-dark); border-bottom-color: var(--gold); }

/* ── Position pills ── */
.pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.pill {
  font-family: 'Rye', serif; font-size: 0.5rem; letter-spacing: 0.14em; text-transform: uppercase;
  border: 1px solid var(--brown-mid); background: transparent; color: var(--brown-light);
  padding: 6px 14px; cursor: pointer; border-radius: 14px; transition: all 0.15s;
}
.pill:hover { border-color: var(--gold); color: var(--brown-dark); }
.pill.active { background: var(--brown-dark); color: var(--gold-light); border-color: var(--brown-dark); }

/* ── Tables ── */
.tbl-wrap { overflow-x: auto; border: 1px solid var(--parchment); border-radius: 2px; background: rgba(255,255,255,0.35); }
table.proj { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
table.proj th {
  font-family: 'Rye', serif; font-size: 0.46rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--cream); background: var(--brown-mid); padding: 9px 10px; text-align: right;
  cursor: pointer; white-space: nowrap; position: sticky; top: 0; user-select: none;
}
table.proj th:first-child, table.proj th.l { text-align: left; }
table.proj th:hover { background: var(--brown-light); }
table.proj th .arrow { color: var(--gold-light); margin-left: 3px; }
table.proj td { padding: 7px 10px; text-align: right; border-bottom: 1px solid rgba(140,94,46,0.18); white-space: nowrap; }
table.proj td.l { text-align: left; }
table.proj tr:hover td { background: rgba(201,150,42,0.08); }
.player-name { font-weight: 600; color: var(--brown-dark); }
.team-tag, .pos-tag {
  font-family: 'Rye', serif; font-size: 0.42rem; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 2px 6px; border-radius: 2px; color: var(--cream); display: inline-block;
}
.pos-QB { background: var(--pos-qb); } .pos-RB { background: var(--pos-rb); }
.pos-WR { background: var(--pos-wr); } .pos-TE { background: var(--pos-te); }
.team-tag { background: var(--brown-light); }
.ppg-val { font-weight: 700; color: var(--green); }
.rank-cell { font-weight: 700; color: var(--brown-dark); }
.delta-up { color: var(--green-light); font-size: 0.78rem; }
.delta-down { color: var(--red); font-size: 0.78rem; }
.muted { color: var(--brown-light); opacity: 0.7; }

/* ── Search ── */
.search-input {
  font-family: 'Crimson Text', serif; font-size: 0.95rem; padding: 7px 12px;
  border: 1px solid var(--brown-mid); border-radius: 2px; background: rgba(255,255,255,0.6);
  color: var(--ink); outline: none; min-width: 200px;
}
.search-input:focus { border-color: var(--gold); }

/* ── Team cards grid ── */
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
.team-card {
  background: var(--brown-dark); border: 1px solid var(--brown-mid); border-radius: 3px;
  padding: 14px 12px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; text-align: center;
}
.team-card:hover { border-color: var(--gold); transform: translateY(-2px); }
.team-card .abbr { font-family: 'Rye', serif; font-size: 1.1rem; color: var(--gold-light); }
.team-card .full { font-size: 0.82rem; color: var(--parchment); opacity: 0.8; margin-top: 2px; }
.team-card .count { font-size: 0.72rem; color: var(--brown-light); margin-top: 6px; }

/* ── Section card ── */
.card {
  background: rgba(255,255,255,0.4); border: 1px solid var(--parchment);
  border-radius: 3px; padding: 16px 18px; margin-bottom: 18px;
}
.card-title {
  font-family: 'Rye', serif; font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--brown-dark); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
}

/* ── Inputs grid (edit forms) ── */
.inp-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 8px; }
.inp-field { display: flex; flex-direction: column; gap: 3px; }
.inp-field label { font-size: 0.62rem; color: var(--brown-light); text-transform: uppercase; letter-spacing: 0.05em; }
.inp-field input {
  font-family: 'Crimson Text', serif; font-size: 0.9rem; padding: 5px 7px; width: 78px;
  border: 1px solid var(--brown-mid); border-radius: 2px; background: rgba(255,255,255,0.7); color: var(--ink); outline: none;
}
.inp-field input.name-input { width: 150px; }
.inp-field input:focus { border-color: var(--gold); }

/* edit player rows */
.ep-row { border-bottom: 1px dashed rgba(140,94,46,0.3); padding: 10px 0; }
.ep-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.ep-out { font-size: 0.78rem; color: var(--green); font-weight: 600; }
.ep-out .stat { color: var(--brown-light); font-weight: 400; margin-left: 10px; }

/* ── Budget tracker ── */
.budget { position: sticky; top: 10px; }
.budget-row { margin-bottom: 9px; }
.budget-label { display: flex; justify-content: space-between; font-size: 0.78rem; margin-bottom: 3px; }
.budget-label .name { color: var(--brown-dark); font-weight: 600; }
.budget-label .nums { color: var(--brown-light); }
.budget-bar { height: 9px; background: rgba(140,94,46,0.2); border-radius: 5px; overflow: hidden; }
.budget-fill { height: 100%; background: var(--green-light); transition: width 0.2s, background 0.2s; }
.budget-fill.over { background: var(--red); }
.budget-rem.neg { color: var(--red); font-weight: 700; }
.budget-rem.ok { color: var(--green-light); }

.layout-2col { display: grid; grid-template-columns: 1fr 320px; gap: 18px; align-items: start; }
@media (max-width: 900px) { .layout-2col { grid-template-columns: 1fr; } }

/* ── Notif ── */
#notif {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--brown-dark); color: var(--cream); border: 2px solid var(--gold);
  padding: 12px 24px; border-radius: 2px; z-index: 2000; display: none; font-size: 0.95rem;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
}
#notif.err { border-color: var(--red); }
#notif.show { display: block; }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-card { background: var(--brown-dark); border: 2px solid var(--gold); border-radius: 2px; padding: 28px 30px; width: 460px; max-width: calc(100vw - 32px); position: relative; }
.modal-card h3 { font-family: 'Rye', serif; font-size: 0.8rem; color: var(--gold-light); margin-bottom: 16px; letter-spacing: 0.1em; }
.modal-card label { font-size: 0.62rem; color: var(--gold); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 5px; margin-top: 10px; }
.modal-card input, .modal-card select {
  width: 100%; font-family: 'Crimson Text', serif; font-size: 0.95rem; padding: 7px 10px;
  border: 1px solid var(--brown-mid); border-radius: 2px; background: rgba(255,255,255,0.08); color: var(--cream); outline: none;
}
.modal-card input:focus { border-color: var(--gold); }
.modal-close { position: absolute; top: 12px; right: 14px; background: none; border: none; cursor: pointer; color: var(--brown-light); font-size: 1.1rem; }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.scoring-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; }
.loading { text-align: center; padding: 50px; color: var(--brown-light); font-style: italic; }
</style>
</head>
<body>
<div class="page-wrap">

<header class="banner">
  <div class="banner-inner">
    <div class="banner-left">
      <a href="https://helper.ffhistorian.com" class="banner-back">&#8592; Sleeper Helper</a>
      <h1>Fantasy <span>Projections</span></h1>
      <div class="banner-sub">2026 Season — Build, Rank &amp; Share Your Projections</div>
    </div>
    <div id="auth-chip"></div>
  </div>
</header>

<main class="content">

  <div id="auth-gate" class="auth-gate hidden">
    <h2>Sign In to Continue</h2>
    <p>Your projections are saved to your FF Historian account. Sign in to build and view them.</p>
    <a href="#" class="btn" onclick="SharedAuth.openModal();return false;">Sign In</a>
  </div>

  <div id="app" class="hidden">
    <div class="tabs">
      <button class="tab-btn active" data-tab="rankings" onclick="switchTab('rankings')">Rankings</button>
      <button class="tab-btn" data-tab="outputs" onclick="switchTab('outputs')">Outputs</button>
      <button class="tab-btn" data-tab="edit" onclick="switchTab('edit')">Edit</button>
      <div style="flex:1"></div>
      <button id="scoring-btn" class="tab-btn" onclick="openScoring()" title="Scoring settings" style="font-size:0.5rem;">⚙ Scoring</button>
    </div>

    <div id="tab-rankings"></div>
    <div id="tab-outputs" class="hidden"></div>
    <div id="tab-edit" class="hidden"></div>
  </div>

</main>
</div>

<div id="notif"></div>

<!-- Scoring modal -->
<div id="scoring-modal" class="modal-overlay">
  <div class="modal-card" style="max-width:500px;">
    <button class="modal-close" onclick="closeModal('scoring-modal')">&#x2715;</button>
    <h3>Scoring Settings</h3>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;">
      <label style="margin:0;white-space:nowrap;">Load preset</label>
      <select id="sc-preset-select" onchange="loadScoringPreset(this.value)" style="flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--brown-mid);color:var(--cream);padding:6px 8px;border-radius:2px;font-family:'Crimson Text',serif;font-size:0.95rem;"></select>
      <button class="btn btn-sm btn-ghost" onclick="deleteScoringPreset()" title="Delete selected preset" style="flex-shrink:0;">Delete</button>
    </div>
    <div class="scoring-grid" id="scoring-fields"></div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:12px;">
      <input id="sc-preset-name" placeholder="Name this preset…" style="flex:1;" />
      <button class="btn btn-sm" onclick="saveScoringPreset()">Save Preset</button>
    </div>
    <div class="modal-actions" style="margin-top:10px;">
      <button class="btn" onclick="saveScoring()">Apply &amp; Recompute</button>
      <button class="btn btn-ghost" onclick="closeModal('scoring-modal')">Cancel</button>
    </div>
  </div>
</div>

<!-- Sheets sync modal -->
<div id="sync-modal" class="modal-overlay">
  <div class="modal-card" style="max-width:560px;">
    <button class="modal-close" onclick="closeModal('sync-modal')">&#x2715;</button>
    <h3>Sync from Google Sheets</h3>
    <label>Spreadsheet ID</label>
    <input id="sync-sheet-id" placeholder="1cPDwEQJr2Ko6fI5D5sBzF4WODjrgIiOxyq2QVFs0elE" />
    <label>Tab Name <span style="color:var(--brown-light);font-size:0.8rem;">(must match the sheet tab exactly)</span></label>
    <input id="sync-tab-name" placeholder="Arizona Cardinals" />
    <div style="margin:10px 0 4px;font-size:0.8rem;color:var(--brown-light);">— or —</div>
    <div class="modal-actions" style="margin-bottom:0;">
      <button class="btn" onclick="runSheetSync('single')">Fetch This Team</button>
      <button class="btn btn-ghost" onclick="runSheetSync('all')">Sync All 32 Teams</button>
      <button class="btn btn-ghost" onclick="closeModal('sync-modal')">Cancel</button>
    </div>
    <div id="sync-preview" style="margin-top:14px;color:var(--parchment);font-size:0.85rem;max-height:320px;overflow:auto;"></div>
  </div>
</div>

<script src="shared-auth.js"></script>
<script>
const API = (location.hostname === 'helper.ffhistorian.com') ? '/api' : 'https://helper.ffhistorian.com/api';
const SEASON = 2026;
const MIN_GAMES_RANK = 5;

const NFL_TEAMS = [
  ['ARI','Cardinals'],['ATL','Falcons'],['BAL','Ravens'],['BUF','Bills'],
  ['CAR','Panthers'],['CHI','Bears'],['CIN','Bengals'],['CLE','Browns'],
  ['DAL','Cowboys'],['DEN','Broncos'],['DET','Lions'],['GB','Packers'],
  ['HOU','Texans'],['IND','Colts'],['JAX','Jaguars'],['KC','Chiefs'],
  ['LV','Raiders'],['LAC','Chargers'],['LAR','Rams'],['MIA','Dolphins'],
  ['MIN','Vikings'],['NE','Patriots'],['NO','Saints'],['NYG','Giants'],
  ['NYJ','Jets'],['PHI','Eagles'],['PIT','Steelers'],['SF','49ers'],
  ['SEA','Seahawks'],['TB','Buccaneers'],['TEN','Titans'],['WAS','Commanders'],
];
const TEAM_NAME = Object.fromEntries(NFL_TEAMS);
const TEAM_FULL_NAME = {
  ARI:'Arizona Cardinals', ATL:'Atlanta Falcons', BAL:'Baltimore Ravens', BUF:'Buffalo Bills',
  CAR:'Carolina Panthers', CHI:'Chicago Bears', CIN:'Cincinnati Bengals', CLE:'Cleveland Browns',
  DAL:'Dallas Cowboys', DEN:'Denver Broncos', DET:'Detroit Lions', GB:'Green Bay Packers',
  HOU:'Houston Texans', IND:'Indianapolis Colts', JAX:'Jacksonville Jaguars', KC:'Kansas City Chiefs',
  LV:'Las Vegas Raiders', LAC:'Los Angeles Chargers', LAR:'Los Angeles Rams', MIA:'Miami Dolphins',
  MIN:'Minnesota Vikings', NE:'New England Patriots', NO:'New Orleans Saints', NYG:'New York Giants',
  NYJ:'New York Jets', PHI:'Philadelphia Eagles', PIT:'Pittsburgh Steelers', SF:'San Francisco 49ers',
  SEA:'Seattle Seahawks', TB:'Tampa Bay Buccaneers', TEN:'Tennessee Titans', WAS:'Washington Commanders',
};

// ── Scoring config ──────────────────────────────────────────────────────────
const SCORING_DEFAULTS = {
  pass_yd: 0.04, pass_td: 4, pass_int: -2,
  rush_yd: 0.1, rush_td: 6,
  rec: 1, rec_yd: 0.1, rec_td: 6,
  fum_lost: -2, te_premium: 0,
};
const SCORING_LABELS = {
  pass_yd: 'Pass Yd', pass_td: 'Pass TD', pass_int: 'Interception',
  rush_yd: 'Rush Yd', rush_td: 'Rush TD',
  rec: 'Reception (PPR)', rec_yd: 'Rec Yd', rec_td: 'Rec TD',
  fum_lost: 'Fumble Lost', te_premium: 'TE Premium (/rec)',
};
let SCORING = loadScoring();
function loadScoring() {
  try { return { ...SCORING_DEFAULTS, ...JSON.parse(localStorage.getItem('proj_scoring') || '{}') }; }
  catch { return { ...SCORING_DEFAULTS }; }
}

// ── State ───────────────────────────────────────────────────────────────────
const state = {
  teams: {},      // { ARI: {plays_per_game, pass_pct, rush_pct, target_pct} }
  players: [],    // [{ player_name, nfl_team, position, inputs, calc_ppg, calc_pts, rank_2025 }]
  loaded: false,
};
let rankPos = 'ALL';            // QB | RB | WR | TE | FLEX | ALL
let rankSort = { col: 'calc_ppg', dir: -1 };
let rankSearch = '';
let editTeam = null;            // currently edited team abbr
let editDraft = null;          // { team:{...}, players:[{...}] } working copy

// ── Helpers ─────────────────────────────────────────────────────────────────
function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function n(v){ const x = parseFloat(v); return isFinite(x) ? x : 0; }
function r1(v){ return Math.round(v*10)/10; }
function notif(msg, isErr){ const e=document.getElementById('notif'); e.textContent=msg; e.className='show'+(isErr?' err':''); setTimeout(()=>e.className='',2600); }
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

async function apiGet(path){ const r = await fetch(API+path, { credentials:'include' }); if(!r.ok) throw new Error('GET '+path+' → '+r.status); return r.json(); }
async function apiPost(path, body){ const r = await fetch(API+path, { method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }); if(!r.ok) throw new Error('POST '+path+' → '+r.status); return r.json(); }

// ── Calculation engine ──────────────────────────────────────────────────────
// All outputs are SEASON TOTALS. PPG = pts / gp.
// Pass attempts split between QBs via GP/17 (each QB gets their pro-rata share
// of the team's season pass plays based on how many games they played).
// Skill players likewise scale their market/target shares by GP/17.

function teamTotals(t){
  const totalPlays  = n(t.total_plays);                                // season total e.g. 1003
  const rushSeason  = totalPlays * n(t.rush_pct)/100;                 // e.g. 451
  const passSeason  = totalPlays * n(t.pass_pct)/100;                 // e.g. 552
  const tgtPct      = t.target_pct == null || t.target_pct === '' ? 95 : n(t.target_pct);
  const targetSeason = passSeason * tgtPct/100;                       // e.g. 524
  return { totalPlays, rushSeason, passSeason, targetSeason };
}

// Returns season-total outputs + ppg for a single player.
function calcPlayer(p, tt){
  const i = p.inputs || {};
  const gp    = n(i.games_played);
  const scale = 17 > 0 ? gp/17 : 0;  // GP/17 pro-ration
  const out   = { pos: p.position, gp };

  if (p.position === 'QB') {
    // Pass att = team season pass plays × GP/17
    const passAtt = tt.passSeason * scale;
    const rushAtt = tt.rushSeason * n(i.rush_market_share)/100 * scale;
    out.passAtt = passAtt;
    out.comp    = passAtt * n(i.completion_pct)/100;
    out.passYds = passAtt * n(i.yards_per_attempt);
    out.passTD  = passAtt * n(i.td_pct)/100;
    out.int     = passAtt * n(i.int_pct)/100;
    out.rushAtt = rushAtt;
    out.rushYds = rushAtt * n(i.yards_per_carry);
    out.rushTD  = rushAtt * n(i.rush_td_rate)/100;
    out.fum     = (passAtt + rushAtt) * n(i.fumble_rate)/100;
    out.pts = out.passYds*SCORING.pass_yd + out.passTD*SCORING.pass_td + out.int*SCORING.pass_int
            + out.rushYds*SCORING.rush_yd + out.rushTD*SCORING.rush_td + out.fum*SCORING.fum_lost;
  } else {
    const rushAtt = tt.rushSeason * n(i.rush_market_share)/100 * scale;
    const targets = tt.targetSeason * n(i.target_share)/100 * scale;
    const rec     = targets * n(i.catch_rate)/100;
    const recYds  = rec * n(i.yards_per_reception);
    const recTD   = rec * n(i.receiving_td_rate)/100;
    const routes  = n(i.routes_per_game) * gp;  // season routes
    out.rushAtt = rushAtt;
    out.rushYds = rushAtt * n(i.yards_per_carry);
    out.rushTD  = rushAtt * n(i.rush_td_rate)/100;
    out.targets = targets;
    out.rec     = rec;
    out.recYds  = recYds;
    out.recTD   = recTD;
    out.routes  = routes;
    out.yprr    = routes>0 ? recYds/routes : 0;
    out.trr     = routes>0 ? targets/routes : 0;
    out.fum     = (rushAtt + rec) * n(i.fumble_rate)/100;
    const tePrem = p.position==='TE' ? rec*SCORING.te_premium : 0;
    out.pts = out.rushYds*SCORING.rush_yd + out.rushTD*SCORING.rush_td
            + out.rec*SCORING.rec + out.recYds*SCORING.rec_yd + out.recTD*SCORING.rec_td
            + out.fum*SCORING.fum_lost + tePrem;
  }

  out.ppg = gp > 0 ? out.pts/gp : 0;
  return out;
}

// Budget pools: available comes from team totals; QB outputs define the receiving pools.
function calcBudgetPools(tt, players){
  const avail = { rushAtt: tt.rushSeason, targets: tt.targetSeason, rec: 0, recYds: 0, recTD: 0 };
  const used  = { rushAtt: 0, targets: 0, rec: 0, recYds: 0, recTD: 0 };
  for (const p of players){
    const o = calcPlayer(p, tt);
    if (p.position === 'QB'){
      avail.rec   += o.comp    || 0;
      avail.recYds += o.passYds || 0;
      avail.recTD  += o.passTD  || 0;
      used.rushAtt += o.rushAtt || 0;
    } else {
      used.rushAtt += o.rushAtt || 0;
      used.targets += o.targets || 0;
      used.rec     += o.rec     || 0;
      used.recYds  += o.recYds  || 0;
      used.recTD   += o.recTD   || 0;
    }
  }
  return { avail, used };
}

// ── Tab 1: Rankings ─────────────────────────────────────────────────────────
function rankedRows(){
  // Recompute fresh PPG from current scoring so the table always reflects settings.
  let rows = state.players.map(p=>{
    const tt = teamTotals(state.teams[p.nfl_team] || {});
    const o = calcPlayer(p, tt);
    return { name:p.player_name, team:p.nfl_team, pos:p.position, gp:o.gp,
             calc_ppg:o.ppg, calc_pts:o.pts, rank_2025:p.rank_2025, out:o };
  });
  if (rankPos==='FLEX') rows = rows.filter(r=>['RB','WR','TE'].includes(r.pos));
  else if (rankPos!=='ALL') rows = rows.filter(r=>r.pos===rankPos);
  if (rankSearch) rows = rows.filter(r=>r.name.toLowerCase().includes(rankSearch));

  // 2026 rank assigned by PPG among GP>=5 within the active pool
  const eligible = rows.filter(r=>r.gp>=MIN_GAMES_RANK).sort((a,b)=>b.calc_ppg-a.calc_ppg);
  eligible.forEach((r,idx)=>r.rank2026 = idx+1);
  rows.filter(r=>r.gp<MIN_GAMES_RANK).forEach(r=>r.rank2026 = null);

  // Apply sort. dir=1 ascending, dir=-1 descending.
  const { dir, col } = rankSort;
  const textCols = { name:r=>r.name.toLowerCase(), pos:r=>r.pos, team:r=>r.team };
  rows.sort((a,b)=>{
    if (textCols[col]){
      const av=textCols[col](a), bv=textCols[col](b);
      return (av<bv?-1:av>bv?1:0)*dir;
    }
    // numeric; nulls (e.g. unranked) sort to the bottom regardless of direction
    const av = a[col] ?? (dir===1 ? Infinity : -Infinity);
    const bv = b[col] ?? (dir===1 ? Infinity : -Infinity);
    return (av-bv)*dir;
  });
  return rows;
}

function renderRankings(){
  const c = document.getElementById('tab-rankings');
  if (!state.loaded){ c.innerHTML = '<div class="loading">Loading…</div>'; return; }
  const pills = ['QB','RB','WR','TE','FLEX','ALL'].map(p=>
    `<button class="pill ${rankPos===p?'active':''}" onclick="setRankPos('${p}')">${p}</button>`).join('');
  const rows = rankedRows();
  const arrow = col => rankSort.col===col ? `<span class="arrow">${rankSort.dir===1?'▲':'▼'}</span>` : '';
  const body = rows.length ? rows.map(r=>{
    let delta = '';
    if (r.rank2026 && r.rank_2025){
      const d = r.rank_2025 - r.rank2026;
      delta = d>0 ? `<span class="delta-up">▲${d}</span>` : d<0 ? `<span class="delta-down">▼${-d}</span>` : '';
    }
    return `<tr>
      <td class="rank-cell">${r.rank2026 ?? '<span class="muted">—</span>'}</td>
      <td>${r.rank_2025 != null ? r.rank_2025 : '<span class="muted">—</span>'} ${delta}</td>
      <td class="l"><span class="player-name">${esc(r.name)}</span></td>
      <td class="l"><span class="pos-tag pos-${r.pos}">${r.pos}</span></td>
      <td class="l"><span class="team-tag">${esc(r.team||'—')}</span></td>
      <td>${r.gp}</td>
      <td>${r1(r.calc_pts)}</td>
      <td class="ppg-val">${r.calc_ppg.toFixed(1)}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="8" class="muted" style="text-align:center;padding:30px;">No projections yet. Build some in the Edit tab.</td></tr>`;

  c.innerHTML = `
    <div class="pills">${pills}
      <div style="flex:1"></div>
      <input class="search-input" placeholder="Search player…" value="${esc(rankSearch)}" oninput="rankSearch=this.value.toLowerCase();renderRankings()" />
    </div>
    <div class="tbl-wrap"><table class="proj">
      <thead><tr>
        <th onclick="sortRank('rank2026')">2026 ${arrow('rank2026')}</th>
        <th onclick="sortRank('rank_2025')">2025 ${arrow('rank_2025')}</th>
        <th class="l" onclick="sortRank('name')">Player ${arrow('name')}</th>
        <th class="l" onclick="sortRank('pos')">Pos ${arrow('pos')}</th>
        <th class="l" onclick="sortRank('team')">Team ${arrow('team')}</th>
        <th onclick="sortRank('gp')">GP ${arrow('gp')}</th>
        <th onclick="sortRank('calc_pts')">Pts ${arrow('calc_pts')}</th>
        <th onclick="sortRank('calc_ppg')">PPG ${arrow('calc_ppg')}</th>
      </tr></thead>
      <tbody>${body}</tbody>
    </table></div>
    <div style="margin-top:8px;font-size:0.8rem;" class="muted">2026 rank assigned by PPG among players with ≥${MIN_GAMES_RANK} games. ${rows.length} players shown.</div>`;
}
function setRankPos(p){ rankPos=p; renderRankings(); }
function sortRank(col){
  if (rankSort.col===col) rankSort.dir*=-1;
  else rankSort = { col, dir: (col==='name'||col==='pos'||col==='team'||col==='rank2026'||col==='rank_2025') ? 1 : -1 };
  renderRankings();
}

// ── Tab 2: Outputs ──────────────────────────────────────────────────────────
let outputsPerGame = true;
function renderOutputs(){
  const c = document.getElementById('tab-outputs');
  if (!state.loaded){ c.innerHTML='<div class="loading">Loading…</div>'; return; }
  const teamsWithPlayers = NFL_TEAMS.filter(([ab])=>state.players.some(p=>p.nfl_team===ab));
  if (!teamsWithPlayers.length){ c.innerHTML='<div class="loading">No projections yet — build some in the Edit tab.</div>'; return; }

  const blocks = teamsWithPlayers.map(([ab,full])=>{
    const players = state.players.filter(p=>p.nfl_team===ab);
    const tt = teamTotals(state.teams[ab]||{});
    const byPos = { QB:[], RB:[], WR:[], TE:[] };
    players.forEach(p=>{ (byPos[p.position]||(byPos[p.position]=[])).push(p); });
    let inner = '';
    for (const pos of ['QB','RB','WR','TE']){
      const list = byPos[pos]; if (!list || !list.length) continue;
      inner += outputTable(pos, list, tt);
    }
    return `<div class="card"><div class="card-title">${ab} — ${full}</div>${inner}</div>`;
  }).join('');

  c.innerHTML = `<div class="pills">
      <button class="pill ${outputsPerGame?'active':''}" onclick="outputsPerGame=true;renderOutputs()">Per Game</button>
      <button class="pill ${!outputsPerGame?'active':''}" onclick="outputsPerGame=false;renderOutputs()">Season Total</button>
    </div>${blocks}`;
}
function outputTable(pos, list, tt){
  // Engine returns season totals; divide by gp for per-game view
  const fmt = (o, v) => r1(outputsPerGame && o.gp > 0 ? v/o.gp : v);
  const header = pos==='QB'
    ? ['Player','GP','Comp','Att','PYds','PTD','INT','RAtt','RYds','RTD','Fum','PPG']
    : ['Player','GP','RAtt','RYds','RTD','Tgt','Rec','RecYds','RecTD','YPRR','PPG'];
  const rows = list.map(p=>{
    const o = calcPlayer(p, tt);
    let cells;
    if (pos==='QB'){
      cells = [o.comp,o.passAtt,o.passYds,o.passTD,o.int,o.rushAtt,o.rushYds,o.rushTD,o.fum]
        .map(v=>`<td>${fmt(o,v)}</td>`).join('');
    } else {
      cells = [o.rushAtt,o.rushYds,o.rushTD,o.targets,o.rec,o.recYds,o.recTD]
        .map(v=>`<td>${fmt(o,v)}</td>`).join('')
        + `<td>${r1(o.yprr)}</td>`;  // YPRR is already a rate, stays as-is
    }
    return `<tr><td class="l"><span class="player-name">${esc(p.player_name)}</span></td><td>${o.gp}</td>${cells}<td class="ppg-val">${o.ppg.toFixed(1)}</td></tr>`;
  }).join('');
  return `<div style="margin-bottom:6px;"><span class="pos-tag pos-${pos}">${pos}</span></div>
    <div class="tbl-wrap" style="margin-bottom:14px;"><table class="proj"><thead><tr>${header.map((h,i)=>`<th class="${i===0?'l':''}">${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

  RB: [['games_played','GP'],['rush_market_share','Rush Mkt%'],['yards_per_carry','Y/Carry'],['rush_td_rate','RushTD%'],['target_share','Tgt Shr%'],['catch_rate','Catch%'],['yards_per_reception','Y/Rec'],['receiving_td_rate','RecTD%'],['routes_per_game','Routes/G'],['fumble_rate','Fum%']],
  WR: [['games_played','GP'],['rush_market_share','Rush Mkt%'],['yards_per_carry','Y/Carry'],['rush_td_rate','RushTD%'],['target_share','Tgt Shr%'],['catch_rate','Catch%'],['yards_per_reception','Y/Rec'],['receiving_td_rate','RecTD%'],['routes_per_game','Routes/G'],['fumble_rate','Fum%']],
};

function renderEditTeam(){
  const c = document.getElementById('tab-edit');

function editPlayerRow(p, idx){
  const fields = POS_FIELDS[p.position].map(([k,l])=>
    `<div class="inp-field"><label>${l}</label><input type="number" step="0.1" value="${p.inputs[k]??''}" oninput="editDraft.players[${idx}].inputs.${k}=this.value;recalcEdit()"></div>`).join('');

}
function addPlayer(pos){
  editDraft.players.push({ player_name:'', position:pos, inputs:{ games_played:17 } });
  renderEditTeam();
}
function removePlayer(idx){
  editDraft.players.splice(idx,1);
  renderEditTeam();
}

function recalcEdit(){
  if (!editDraft) return;
  const tt = teamTotals(editDraft.team);

  // Update each player's live output display
  editDraft.players.forEach((p,idx)=>{
    const el = document.getElementById('epout-'+idx);
    if (!el) return;
    const o = calcPlayer(p, tt);
    if (p.position==='QB'){
      el.innerHTML = `<span class="stat">PPG</span> ${o.ppg.toFixed(1)} <span class="stat">Att</span>${r1(o.passAtt)} <span class="stat">Comp</span>${r1(o.comp)} <span class="stat">PYds</span>${r1(o.passYds)} <span class="stat">PTD</span>${r1(o.passTD)} <span class="stat">RAtt</span>${r1(o.rushAtt)} <span class="stat">RYds</span>${r1(o.rushYds)}`;
    } else {
      el.innerHTML = `<span class="stat">PPG</span> ${o.ppg.toFixed(1)} <span class="stat">Tgt</span>${r1(o.targets)} <span class="stat">Rec</span>${r1(o.rec)} <span class="stat">RecYds</span>${r1(o.recYds)} <span class="stat">RAtt</span>${r1(o.rushAtt)} <span class="stat">YPRR</span>${r1(o.yprr)}`;
    }
  });

  // Budget tracker
  const { avail, used } = calcBudgetPools(tt, editDraft.players);
  const budgets = [
    ['Rush Att',   avail.rushAtt, used.rushAtt],
    ['Targets',    avail.targets, used.targets],
    ['Receptions', avail.rec,     used.rec    ],
    ['Rec Yards',  avail.recYds,  used.recYds ],
    ['Rec TDs',    avail.recTD,   used.recTD  ],
  ];
  const bb = document.getElementById('budget-body');
  if (bb) bb.innerHTML = budgets.map(([label,pool,u])=>{
    const rem = pool - u;
    const pct = pool>0 ? Math.min(100, u/pool*100) : 0;
    const over = rem < -0.05;
    return `<div class="budget-row">
      <div class="budget-label"><span class="name">${label}</span>
        <span class="nums">${r1(u)} / ${r1(pool)} <span class="budget-rem ${over?'neg':'ok'}">(${rem>=0?'+':''}${r1(rem)})</span></span></div>
      <div class="budget-bar"><div class="budget-fill ${over?'over':''}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

async function saveTeam(){
  try {
    // Persist team inputs
    await apiPost(`/projections/teams?season=${SEASON}`, { teams: { [editTeam]: editDraft.team } });
    // Persist players (scoped replace so removed players are dropped)
    const tt = teamTotals(editDraft.team);
    const players = editDraft.players
      .filter(p=>p.player_name && p.player_name.trim())
      .map(p=>{
        const o = calcPlayer(p, tt);
        return { player_name:p.player_name.trim(), nfl_team:editTeam, position:p.position,
                 inputs:p.inputs, calc_ppg:r1(o.ppg), calc_pts:r1(o.pts), rank_2025:p.rank_2025 ?? null };
      });
    await apiPost(`/projections/players?season=${SEASON}`, { players, replaceTeam: editTeam });
    // Update in-memory state
    state.teams[editTeam] = {...editDraft.team};
    state.players = state.players.filter(p=>p.nfl_team!==editTeam).concat(players.map(p=>({...p})));
    notif(`Saved ${players.length} players for ${editTeam}`);
  } catch(e){ notif('Save failed: '+e.message, true); }
}

function openSync() {
  _syncParsed = null;
  document.getElementById('sync-preview').innerHTML = '';

  document.getElementById('sync-sheet-id').value = saved;

async function runSheetSync(mode) {
  const sheetId = document.getElementById('sync-sheet-id').value.trim();
  if (!sheetId) { notif('Enter a spreadsheet ID', true); return; }
  localStorage.setItem('proj_sheet_id', sheetId);

  const preview = document.getElementById('sync-preview');
  preview.innerHTML = '<div style="color:var(--gold-light);">Fetching…</div>';

  if (mode === 'all') {
    preview.innerHTML = '<div style="color:var(--gold-light);">Fetching all 32 team tabs…</div>';
    try {
      const res = await apiPost('/projections/sync-sheets', { sheetId, action: 'fetch-all' });
      const allParsed = {};
      let found = 0, missing = [];
      for (const [abbr, csv] of Object.entries(res.teams || {})) {
        if (!csv) { missing.push(abbr); continue; }
        allParsed[abbr] = parseTeamCSV(csv, abbr);
        found++;
      }
      _syncParsed = { mode: 'all', data: allParsed };
      const missingHtml = missing.length
        ? `<div style="margin-top:6px;color:var(--red);">Not found (${missing.length}): ${missing.join(', ')}</div>`
        : '';
      const confirmBtn = found > 0
        ? `<button class="btn" style="margin-top:12px;" onclick="confirmSyncImport()">Import ${found} Teams</button>` : '';
      preview.innerHTML = `<div style="color:var(--green-light);font-weight:600;">Found ${found}/32 team tabs.</div>${missingHtml}${confirmBtn}`;
    } catch(e) { preview.innerHTML = `<div style="color:var(--red);">Error: ${esc(e.message)}</div>`; }
    return;
  }

  // Single team mode
  const tabName = document.getElementById('sync-tab-name').value.trim();
  if (!tabName) { notif('Enter the tab name', true); return; }
  try {
    const res = await apiPost('/projections/sync-sheets', { sheetId, sheetName: tabName });
    const parsed = parseTeamCSV(res.csv || '', editTeam);
    _syncParsed = { mode: 'single', data: parsed };
    const qbs = parsed.players.filter(p=>p.position==='QB').length;
    const rbs = parsed.players.filter(p=>p.position==='RB').length;
    const wrs = parsed.players.filter(p=>p.position==='WR').length;
    const tes = parsed.players.filter(p=>p.position==='TE').length;
    const teamLine = parsed.team.total_plays
      ? `<div style="margin-top:6px;color:var(--parchment);">Team: ${parsed.team.total_plays} plays, ${parsed.team.pass_pct}% pass, ${parsed.team.rush_pct}% rush, ${parsed.team.target_pct}% target</div>`
      : '<div style="margin-top:6px;color:var(--brown-light);">Team-level inputs not detected (check tab structure)</div>';
    preview.innerHTML = `
      <div style="color:var(--green-light);font-weight:600;">${parsed.players.length} players found: ${qbs} QB, ${rbs} RB, ${wrs} WR, ${tes} TE</div>
      ${teamLine}
      <ul style="margin:8px 0 0;padding-left:18px;color:var(--parchment);font-size:0.82rem;">
        ${parsed.players.map(p=>`<li>${esc(p.player_name)} (${p.position}) — GP: ${p.inputs.games_played}</li>`).join('')}
      </ul>
      <button class="btn" style="margin-top:12px;" onclick="confirmSyncImport()">Confirm &amp; Import into Form</button>`;
  } catch(e) { preview.innerHTML = `<div style="color:var(--red);">Error: ${esc(e.message)}</div>`; }
}

async function confirmSyncImport() {
  if (!_syncParsed) return;
  if (_syncParsed.mode === 'all') {
    // Save all teams to DB
    let saved = 0;
    for (const [abbr, parsed] of Object.entries(_syncParsed.data)) {
      try {
        const players = parsed.players.map(p => {
          const o = calcPlayer(p, teamTotals(parsed.team));
          return { ...p, calc_ppg: o.ppg, calc_pts: o.pts };
        });
        const teamPayload = { ...parsed.team };
        await Promise.all([
          apiPost(`/projections/players?season=${SEASON}`, { players, replaceTeam: abbr }),
          apiPost(`/projections/teams?season=${SEASON}`, { teams: [{ nfl_team: abbr, inputs: teamPayload }] }),
        ]);
        // Update local state
        state.teams[abbr] = { ...parsed.team };
        state.players = state.players.filter(p=>p.nfl_team!==abbr).concat(players);
        saved++;
      } catch(e) { console.warn('Failed to save', abbr, e); }
    }
    closeModal('sync-modal');
    notif(`Imported ${saved} teams from Google Sheets`);
    renderActive();
  } else {
    // Single team: populate editDraft
    const { data } = _syncParsed;
    editDraft.team = { ...editDraft.team, ...data.team };
    editDraft.players = data.players.map(p => ({ ...p }));
    closeModal('sync-modal');
    renderEdit();
    notif(`Imported ${data.players.length} players for ${editTeam}`);
  }
}

// ── CSV parsing ──────────────────────────────────────────────────────────────
function parseCSVRows(text) {
  const rows = [];
  let row = [], cur = '', quoted = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (quoted) {
      if (c === '"') { if (text[i+1] === '"') { cur += '"'; i++; } else quoted = false; }
      else cur += c;
    } else if (c === '"') { quoted = true; }
    else if (c === ',') { row.push(cur); cur = ''; }
    else if (c === '\n') { row.push(cur); cur = ''; rows.push(row); row = []; }
    else if (c !== '\r') { cur += c; }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

function csvPct(s) {
  if (s == null || s === '') return '';
  const str = String(s).trim().replace(/,/g, '');
  if (str.endsWith('%')) { const v = parseFloat(str); return isFinite(v) ? v : ''; }
  const v = parseFloat(str);
  if (!isFinite(v)) return '';
  return (v > 0 && v <= 1) ? +(v * 100).toFixed(4) : v;
}

function csvNum(s) {
  if (s == null || s === '') return '';
  const v = parseFloat(String(s).trim().replace(/[,$%]/g, ''));
  return isFinite(v) ? v : '';
}

function parseTeamCSV(csvText, abbr) {
  const rows = parseCSVRows(csvText);
  const result = { team: { total_plays: '', pass_pct: '', rush_pct: '', target_pct: 95 }, players: [] };

  // Fixed player-row counts per position
  const FIXED_COUNTS = { QB: 2, RB: 3, WR: 5, TE: 3 };
  let currentPos = null;
  let nameCol = -1;   // dynamically detected column index for player name / position label
  let posRowsLeft = 0;

  for (const cells of rows) {
    // Scan first 8 columns for team-level keywords; value is always in the next cell
    for (let ci = 0; ci < Math.min(cells.length - 1, 8); ci++) {
      const clo = (cells[ci] || '').trim().toLowerCase();
      const val = cells[ci + 1];
      if (clo.includes('total plays')) { result.team.total_plays = csvNum(val); break; }
      if (clo.match(/^pass\s*%?$/)) { result.team.pass_pct = csvPct(val); break; }
      if (clo.match(/^rush\s*%?$/)) { result.team.rush_pct = csvPct(val); break; }
      if (clo.includes('allocated target') || clo.includes('target %')) { result.team.target_pct = csvPct(val); break; }
    }

    // Detect position section header: any cell is QB/RB/WR/TE AND "games" appears anywhere in the row
    const hasGames = cells.some(c => (c || '').toLowerCase().includes('games'));
    if (hasGames) {
      const pi = cells.findIndex((c, i) => i < 8 && ['QB','RB','WR','TE'].includes((c || '').trim().toUpperCase()));
      if (pi >= 0) {
        currentPos = cells[pi].trim().toUpperCase();
        nameCol = pi;
        posRowsLeft = FIXED_COUNTS[currentPos];
        continue; // skip the header row itself
      }
    }

    if (!currentPos || posRowsLeft <= 0 || nameCol < 0) continue;

    // Consume this row against the fixed count regardless of whether it has a player
    posRowsLeft--;

    const playerName = (cells[nameCol] || '').trim();
    if (!playerName) continue; // blank slot — counted above, no player added

    const plo = playerName.toLowerCase();
    if (['total','remaining','check','inputs','outputs','fantasy'].some(kw => plo.includes(kw))) continue;

    const nc = nameCol;
    const gp = csvNum(cells[nc + 1]);
    if (gp === '' || gp < 1 || gp > 18) continue;

    const player = { player_name: playerName, position: currentPos, nfl_team: abbr || '', inputs: {} };

    if (currentPos === 'QB') {
      // nc+1=GP, nc+2=Dropbacks(skip), nc+3=comp%, nc+4=Y/A, nc+5=TD%, nc+6=INT%,
      // nc+7=rush_mkt%, nc+8=Y/carry, nc+9=rush_td%, nc+10=fum%
      player.inputs = {
        games_played: gp,
        completion_pct: csvPct(cells[nc + 3]),
        yards_per_attempt: csvNum(cells[nc + 4]),
        td_pct: csvPct(cells[nc + 5]),
        int_pct: csvPct(cells[nc + 6]),
        rush_market_share: csvPct(cells[nc + 7]),
        yards_per_carry: csvNum(cells[nc + 8]),
        rush_td_rate: csvPct(cells[nc + 9]),
        fumble_rate: csvPct(cells[nc + 10]),
      };
    } else {
      // nc+1=GP, nc+2=rush_mkt%, nc+3=Y/carry, nc+4=rush_td%, nc+5=target%,
      // nc+6=catch%, nc+7=Y/rec, nc+8=rec_td%, nc+9=routes/G, nc+10=fum% (RB only)
      player.inputs = {
        games_played: gp,
        rush_market_share: csvPct(cells[nc + 2]),
        yards_per_carry: csvNum(cells[nc + 3]),
        rush_td_rate: csvPct(cells[nc + 4]),
        target_share: csvPct(cells[nc + 5]),
        catch_rate: csvPct(cells[nc + 6]),
        yards_per_reception: csvNum(cells[nc + 7]),
        receiving_td_rate: csvPct(cells[nc + 8]),
        routes_per_game: csvNum(cells[nc + 9]),
      };
      if (currentPos === 'RB') player.inputs.fumble_rate = csvPct(cells[nc + 10]);
    }
    result.players.push(player);
  }
  return result;
}

// ── Scoring presets ─────────────────────────────────────────────────────────
function loadScoringPresets() {
  try { return JSON.parse(localStorage.getItem('proj_scoring_presets') || '[]'); } catch { return []; }
}
function saveScoringPresetsToStorage(presets) {
  localStorage.setItem('proj_scoring_presets', JSON.stringify(presets));
}
function getScoringActiveKey() {
  return localStorage.getItem('proj_scoring_active') || '__default__';
}
function setScoringActiveKey(key) {
  localStorage.setItem('proj_scoring_active', key);
}
function renderScoringFields(scoring) {
  document.getElementById('scoring-fields').innerHTML = Object.keys(SCORING_LABELS).map(k =>
    `<div class="inp-field" style="width:auto;"><label>${SCORING_LABELS[k]}</label>
     <input id="sc-${k}" type="number" step="0.01" value="${scoring[k] ?? ''}" style="width:100%;"></div>`
  ).join('');
}
function refreshPresetDropdown(activeKey) {
  const presets = loadScoringPresets();
  const sel = document.getElementById('sc-preset-select');
  sel.innerHTML =
    `<option value="__default__">Default (PPR)</option>` +
    presets.map((p, i) => `<option value="${i}">${esc(p.name)}</option>`).join('') +
    `<option value="__custom__">— Custom —</option>`;
  sel.value = activeKey !== undefined ? activeKey : getScoringActiveKey();
}
function updateScoringBtn() {
  const key = getScoringActiveKey();
  let label = 'PPR';
  if (key !== '__default__' && key !== '__custom__') {
    const presets = loadScoringPresets();
    label = presets[parseInt(key)]?.name || 'Custom';
  } else if (key === '__custom__') {
    label = 'Custom';
  }
  const btn = document.getElementById('scoring-btn');
  if (btn) btn.textContent = `⚙ ${label}`;
}

// ── Scoring modal ───────────────────────────────────────────────────────────
function openScoring() {
  refreshPresetDropdown();
  renderScoringFields(SCORING);
  const key = getScoringActiveKey();
  const nameInput = document.getElementById('sc-preset-name');
  if (key !== '__default__' && key !== '__custom__') {
    nameInput.value = loadScoringPresets()[parseInt(key)]?.name || '';
  } else {
    nameInput.value = '';
  }
  openModal('scoring-modal');
}
function loadScoringPreset(val) {
  let scoring;
  if (val === '__default__') {
    scoring = { ...SCORING_DEFAULTS };
    document.getElementById('sc-preset-name').value = '';
  } else if (val === '__custom__') {
    return;
  } else {
    const preset = loadScoringPresets()[parseInt(val)];
    if (!preset) return;
    scoring = { ...SCORING_DEFAULTS, ...preset.scoring };
    document.getElementById('sc-preset-name').value = preset.name;
  }
  renderScoringFields(scoring);
}
function saveScoringPreset() {
  const name = document.getElementById('sc-preset-name').value.trim();
  if (!name) { notif('Enter a name for this preset', true); return; }
  const scoring = {};
  Object.keys(SCORING_LABELS).forEach(k => { scoring[k] = n(document.getElementById('sc-'+k).value); });
  const presets = loadScoringPresets();
  const existing = presets.findIndex(p => p.name === name);
  if (existing >= 0) { presets[existing].scoring = scoring; }
  else { presets.push({ name, scoring }); }
  saveScoringPresetsToStorage(presets);
  const idx = existing >= 0 ? existing : presets.length - 1;
  refreshPresetDropdown(String(idx));
  notif(`Preset "${name}" saved`);
}
function deleteScoringPreset() {
  const val = document.getElementById('sc-preset-select').value;
  if (val === '__default__' || val === '__custom__') { notif('Cannot delete built-in presets', true); return; }
  const presets = loadScoringPresets();
  const name = presets[parseInt(val)]?.name;
  presets.splice(parseInt(val), 1);
  saveScoringPresetsToStorage(presets);
  if (getScoringActiveKey() === val) setScoringActiveKey('__default__');
  refreshPresetDropdown('__default__');
  renderScoringFields(SCORING_DEFAULTS);
  document.getElementById('sc-preset-name').value = '';
  notif(`Preset "${name}" deleted`);
}
function saveScoring() {
  Object.keys(SCORING_LABELS).forEach(k => { SCORING[k] = n(document.getElementById('sc-'+k).value); });
  localStorage.setItem('proj_scoring', JSON.stringify(SCORING));
  setScoringActiveKey(document.getElementById('sc-preset-select').value);
  closeModal('scoring-modal');
  updateScoringBtn();
  notif('Scoring updated');
  renderActive();
  if (editDraft) recalcEdit();
}

boot();
</script>
